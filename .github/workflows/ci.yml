name: Z-Shift CI

on:
  push:
    branches: [ main ]
    paths-ignore: ['README.md', 'LICENSE']
  pull_request:
    branches: [ main ]
    paths-ignore: ['README.md', 'LICENSE']
  workflow_dispatch:

jobs:
  # -----------------------------------------------------------------------------
  # JOB 1: STATIC ANALYSIS (LINTING)
  # CI and local test use identical rules without duplicating the ignore list.
  # -----------------------------------------------------------------------------
  lint:
    runs-on: ubuntu-latest
    name: Syntax Check
    steps:
      - uses: actions/checkout@v4

      - name: Install Shellcheck & Zsh
        run: sudo apt-get install -y shellcheck zsh

      - name: Lint Installer (Bash)
        run: shellcheck install.sh

      - name: Lint Theme Switcher (Bash)
        run: shellcheck theme.sh

      - name: Lint Uninstaller (Bash)
        run: shellcheck uninstall.sh

      - name: Verify Zsh Syntax (.zshrc)
        run: zsh -n .zshrc

  # -----------------------------------------------------------------------------
  # JOB 2: INTEGRATION TEST (UBUNTU & MACOS)
  # -----------------------------------------------------------------------------
  integration-test:
    needs: lint
    name: Install on ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Grant Execute Permissions
        run: chmod +x install.sh

      - name: Run Installer (Non-Interactive)
        run: yes | ./install.sh
        env:
          CI_ENV: true

      - name: Verify Zshrc Created
        run: |
          if [ ! -f "$HOME/.zshrc" ]; then
            echo "Error: .zshrc was not created!"
            exit 1
          fi

      # Run zsh once to trigger the Zinit git clone inside .zshrc.
      - name: Bootstrap Zinit (Initialize Zsh)
        run: |
          zsh -ic "exit" 2>&1 || echo "Note: zsh bootstrap exited non-zero (likely async plugin load — see output above)"

      - name: Verify Zinit Installed
        run: |
          if [ ! -d "${HOME}/.local/share/zinit" ] && [ ! -d "${HOME}/.zinit" ]; then
            echo "Error: Zinit directory not found! Plugin installation failed."
            exit 1
          fi


      - name: Verify Core Tools Installed
        run: |
          MISSING=()
          for tool in eza bat fzf zoxide starship; do
            if zsh -ic "command -v $tool" > /dev/null 2>&1; then
              echo "PASS: $tool found"
            else
              echo "WARN: $tool not found (may still be loading via Zinit turbo)"
              MISSING+=("$tool")
            fi
          done
          # Fail if more than half the tools are missing — something went wrong.
          if [ "${#MISSING[@]}" -ge 3 ]; then
            echo "Error: Too many tools missing: ${MISSING[*]}"
            exit 1
          fi

# -----------------------------------------------------------------------------
  # JOB 3: MULTI-DISTRO DOCKER TEST (ARCH & FEDORA)
  # -----------------------------------------------------------------------------
  docker-matrix:
    needs: lint
    name: Docker Test (${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        distro: [archlinux:latest, fedora:latest]

    steps:
      - uses: actions/checkout@v4

      - name: Test in Docker
        run: |
          docker run --rm -v ${{ github.workspace }}:/workspace -w /workspace ${{ matrix.distro }} /bin/bash -c "
            GREEN='\033[0;32m'
            NC='\033[0m'

            echo -e \"\${GREEN}>>> 1. SETUP: Installing dependencies for ${{ matrix.distro }}...\${NC}\"

            # --- ARCH LINUX ---
            if [ -f /etc/arch-release ]; then
              pacman -Sy --noconfirm archlinux-keyring
              pacman -Syu --noconfirm git curl wget unzip sudo which base-devel ca-certificates
              useradd -m -s /bin/bash tester
              echo 'tester ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
            fi

            # --- FEDORA ---
            if [ -f /etc/fedora-release ]; then
              dnf upgrade -y --refresh
              dnf install -y git curl wget unzip sudo util-linux-user which findutils dnf-plugins-core ca-certificates
              dnf install -y eza || (dnf copr enable -y piegames/eza && dnf install -y eza)
              useradd -m -s /bin/bash tester
              echo 'tester ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers
            fi

            echo -e \"\${GREEN}>>> 2. PREPARE: Injecting local file path...\${NC}\"

            cp /workspace/install.sh /tmp/install.sh
            cp /workspace/.zshrc /tmp/.zshrc
            sed -i 's|^ZSHRC_URL=.*|ZSHRC_URL=\"file:///tmp/.zshrc\"|' /tmp/install.sh
            chmod +x /tmp/install.sh
            chmod 644 /tmp/.zshrc
            chown -R tester:tester /tmp

            echo -e \"\${GREEN}>>> 3. TEST: Running installer as user tester...\${NC}\"

            su tester -c 'export CI_ENV=true && yes | /tmp/install.sh'

            echo -e \"\${GREEN}>>> 4. VERIFY: Checking results...\${NC}\"

            if [ -f /home/tester/.zshrc ]; then
              echo 'SUCCESS: .zshrc created'
            else
              echo 'FAILURE: .zshrc missing'
              exit 1
            fi

            su tester -c 'zsh -ic exit' 2>&1 || echo 'Note: zsh bootstrap exited non-zero'

            if [ -d /home/tester/.local/share/zinit ]; then
              echo 'SUCCESS: Zinit installed'
            else
              echo 'FAILURE: Zinit missing'
              exit 1
            fi

            echo -e \"\${GREEN}>>> 5. VERIFY: Checking tool availability...\${NC}\"
            MISSING=0
            for tool in eza starship; do
              if su tester -c \"zsh -ic 'command -v $tool'\" > /dev/null 2>&1; then
                echo \"SUCCESS: \$tool found\"
              else
                echo \"WARN: \$tool not found\"
                MISSING=\$((MISSING + 1))
              fi
            done
            if [ \"\$MISSING\" -ge 2 ]; then
              echo 'FAILURE: Too many tools missing'
              exit 1
            fi
          "